<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Промо-хаб</title>
    <link rel="preload" as="font" href="./fonts/Manrope_Cut_008-Medium.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="./fonts/Manrope_Cut_008-ExtraBold.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="image" href="./assets/proto-list.png?v=figma-107-36052-20260701-4" fetchpriority="high">
    <link rel="preload" as="image" href="./assets/ai-card-sale-new.png?v=figma-107-36052-20260701-4">
    <link rel="stylesheet" href="./site.css?v=figma-107-36052-20260701-4">
  </head>
  <body>
    <main class="app" data-app data-screen="list" aria-label="Промо-хаб">
      <section class="screen screen-list is-active" data-panel="list" aria-label="Мои объявления">
        <div class="screen-scroll" data-scroll="list">
          <img class="screen-image" src="./assets/proto-list.png?v=figma-107-36052-20260701-4" alt="">
          <button class="hit hit-factoid" type="button" data-action="discounts" aria-label="Открыть скидки и акции"></button>
        </div>
        <div class="fixed-crop list-header" aria-hidden="true">
          <img src="./assets/proto-list.png?v=figma-107-36052-20260701-4" alt="">
        </div>
        <div class="fixed-crop list-footer" aria-hidden="true">
          <img src="./assets/proto-list.png?v=figma-107-36052-20260701-4" alt="">
        </div>
      </section>

      <section class="screen screen-discounts" data-panel="discounts" aria-label="Скидки и акции">
        <div class="screen-scroll" data-scroll="discounts">
          <img class="screen-image" data-src="./assets/proto-discounts.png?v=figma-107-36052-20260701-4" alt="">
          <button class="hit hit-back" type="button" data-action="list" aria-label="Назад"></button>
          <button class="hit hit-level" type="button" data-action="level" aria-label="Открыть уровень"></button>

          <section class="ai-section-live" aria-label="Нейро-советы">
            <img class="ai-section-header" src="./assets/ai-header-new.png?v=figma-107-36052-20260701-4" alt="Нейро-советы">
            <span class="ai-title-shimmer" aria-hidden="true"></span>
            <div class="carousel carousel-ai carousel-ai-new" aria-label="Свайп нейро-советов">
              <div class="carousel-track">
                <img class="ai-card" src="./assets/ai-card-sale-new.png?v=figma-107-36052-20260701-4" alt="Отправьте товары на распродажу">
                <article class="ai-card ai-card-html" aria-label="Подключите скидку на доставку">
                  <div class="ai-card-text">
                    <h2>Подключите скидку на доставку</h2>
                    <p>Товарами интересуются<br>из других городов</p>
                  </div>
                  <div class="ai-card-images" aria-hidden="true">
                    <img class="ai-card-image ai-card-image-back" src="./assets/ai-delivery-img-back.png?v=figma-107-36052-20260701-4" alt="">
                    <img class="ai-card-image ai-card-image-front" src="./assets/ai-delivery-img-front.png?v=figma-107-36052-20260701-4" alt="">
                  </div>
                </article>
                <img class="ai-card" src="./assets/ai-card-quantity-new.png?v=figma-107-36052-20260701-4" alt="Подключите скидку на количество">
                <article class="ai-all-card ai-all-card-html" aria-label="Все доступные">
                  <h2>Все доступные</h2>
                  <img src="./assets/ai-arrow-button.png?v=figma-107-36052-20260701-4" alt="" aria-hidden="true">
                </article>
              </div>
            </div>
          </section>

          <div class="carousel carousel-sales" aria-label="Свайп распродаж">
            <div class="carousel-track">
              <img class="sale-card" src="./assets/card-sale.png?v=figma-107-36052-20260701-4" alt="Распродажа летних товаров">
              <img class="sale-card" src="./assets/card-sale.png?v=figma-107-36052-20260701-4" alt="Распродажа летних товаров">
              <img class="sale-card" src="./assets/card-sale.png?v=figma-107-36052-20260701-4" alt="Распродажа летних товаров">
              <img class="sale-all-card" src="./assets/card-sale-all.png?v=figma-107-36052-20260701-4" alt="Все доступные распродажи">
            </div>
          </div>
        </div>

        <div class="fixed-crop sticky-discounts" data-sticky-header aria-hidden="true">
          <img src="./assets/proto-sticky-header-clean.png?v=figma-107-36052-20260701-4" alt="">
        </div>
        <button class="sticky-back-hit" type="button" data-action="list" aria-label="Назад"></button>
        <div class="fixed-crop discounts-home-indicator" aria-hidden="true">
          <img src="./assets/proto-discounts.png?v=figma-107-36052-20260701-4" alt="">
        </div>
      </section>

      <div class="sheet-backdrop" data-sheet-backdrop aria-hidden="true">
        <section class="level-sheet" aria-label="Уверенный уровень">
          <div class="sheet-scroll" data-sheet-scroll>
            <img class="sheet-image" data-src="./assets/proto-level-sheet.png?v=figma-107-36052-20260701-4" alt="">
          </div>
          <div class="sheet-close-visual" aria-hidden="true">
            <img src="./assets/sheet-close.png?v=figma-107-36052-20260701-4" alt="">
          </div>
          <button class="sheet-close" type="button" data-action="close-sheet" aria-label="Закрыть уровень"></button>
          <div class="sheet-home-indicator" aria-hidden="true">
            <img src="./assets/proto-level-sheet.png?v=figma-107-36052-20260701-4" alt="">
          </div>
        </section>
      </div>
    </main>

    <script src="./site.js?v=figma-107-36052-20260701-4"></script>
  </body>
</html>
